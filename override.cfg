[autoload]

ModLoader="*res://scripts/core/mod_loader.gd"
ExtraStimulantsPlusSettings="*res://scripts/core/extra_stimulants_plus_settings.gd"
AudioVisualizer="*res://scripts/core/audio_visualizer.gd"
GhostRecorder="*res://scripts/core/ghost_recorder.gd"
MutatorManager="*res://scripts/core/mutator_manager.gd"

[display]

window/size/viewport_width=1920
window/size/viewport_height=1080
window/stretch/mode="canvas_items"
window/stretch/aspect="expand"
window/vsync/vsync_mode=0

[rendering]

renderer/rendering_method.mobile="gl_compatibility"
textures/vram_compression/import_etc2_astc=true

[editor_plugins]

enabled=PackedStringArray("res://addons/steam_sdk/plugin.cfg", "res://addons/game_analytics/plugin.cfg")
